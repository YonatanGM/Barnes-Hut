image: ubuntu:22.04

stages:
  - build
  - test
  - coverage

variables:
  BUILD_DIR: build

before_script:
  - export DEBIAN_FRONTEND=noninteractive
  - apt-get update -qq
  - apt-get install -qq -y build-essential cmake libomp-dev libopenmpi-dev openmpi-bin git wget
  - wget -qO- https://github.com/linux-test-project/lcov/archive/refs/tags/v2.2.tar.gz | tar xz
  - cd lcov-2.2 && make install && cd ..
  - lcov --version

build_project:
  stage: build
  script:
    - mkdir -p $BUILD_DIR && cd $BUILD_DIR
    - cmake -DENABLE_COVERAGE=ON -DWITH_TESTS=ON -DCMAKE_BUILD_TYPE=Debug ..
    - make -j$(nproc)
  artifacts:
    paths:
      - $BUILD_DIR
    expire_in: 1 hour

test_project:
  stage: test
  script:
    - cd $BUILD_DIR
    - ctest --output-on-failure

generate_coverage:
  stage: coverage
  script:
    - cd $BUILD_DIR
    - make coverage
  artifacts:
    paths:
      - $BUILD_DIR/coverage
    when: always
  coverage: '/lines.*: ([0-9]+\.[0-9]+)%/'
